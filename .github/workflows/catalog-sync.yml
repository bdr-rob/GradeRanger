name: Catalog sync

# Syncs TCG set metadata and card checklists from TCG API (api.tcgapi.dev)
# into tcg_sets and tcg_cards tables for offline browsing.
#
# Weekly run (Mondays 06:00 UTC):
#   - sync_sets: refresh set metadata for all 6 games (fast)
#   - sync_cards: fill in card checklists for any sets missing them
#
# The edge function is idempotent — sets/cards already synced are upserted,
# and card sync is skipped for sets that already have cards_synced_at set.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      action:
        description: 'sync_sets | sync_cards | sync_all'
        required: false
        default: 'sync_all'
      game:
        description: 'Limit to one game slug (e.g. pokemon). Leave blank for all.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync TCG catalog
        env:
          SB_URL: https://bgufxqivlxlfebayydcl.supabase.co
          SB_ANON_KEY: ${{ secrets.SB_ANON_KEY }}
        run: |
          set -euo pipefail

          ACTION="${{ github.event.inputs.action || 'sync_all' }}"
          GAME="${{ github.event.inputs.game || '' }}"

          BODY="{\"action\":\"$ACTION\""
          if [ -n "$GAME" ]; then
            BODY="$BODY,\"game\":\"$GAME\""
          fi
          BODY="$BODY}"

          echo "Calling tcg-catalog with: $BODY"

          HTTP_STATUS=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
            -X POST "$SB_URL/functions/v1/tcg-catalog" \
            -H "apikey: $SB_ANON_KEY" \
            -H "Authorization: Bearer $SB_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response:"
          cat /tmp/response.json

          if jq -e '.error' /tmp/response.json > /dev/null 2>&1; then
            echo "Function returned an error: $(jq -r '.error' /tmp/response.json)"
            exit 1
          fi

          echo "Sync complete"
          jq '.summary' /tmp/response.json
